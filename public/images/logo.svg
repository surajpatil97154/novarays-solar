<svg width="200" height="80" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Wind Turbine -->
  <rect x="15" y="35" width="3" height="20" fill="#333"/>
  <circle cx="18.5" cy="33" r="3" fill="#333"/>
  <path d="M18.5 28 L20 32 L17 32 Z" fill="#22C55E"/>
  <path d="M18.5 28 L18 32.5 L23 30 Z" fill="#16A34A"/>
  <path d="M18.5 28 L16 31 L19 34 Z" fill="#22C55E"/>

  <!-- Sun -->
  <circle cx="55" cy="20" r="8" fill="#FFB800"/>
  <line x1="55" y1="8" x2="55" y2="2" stroke="#FFB800" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="67" y1="20" x2="73" y2="20" stroke="#FFB800" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="63" y1="14" x2="68" y2="9" stroke="#FFB800" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Solar Panels -->
  <rect x="45" y="32" width="20" height="12" fill="none" stroke="#1e40af" stroke-width="1"/>
  <rect x="47" y="34" width="4" height="4" fill="#1e40af"/>
  <rect x="53" y="34" width="4" height="4" fill="#1e40af"/>
  <rect x="59" y="34" width="4" height="4" fill="#1e40af"/>
  <rect x="47" y="40" width="4" height="4" fill="#1e40af"/>
  <rect x="53" y="40" width="4" height="4" fill="#1e40af"/>
  <rect x="59" y="40" width="4" height="4" fill="#1e40af"/>

  <!-- House -->
  <rect x="72" y="38" width="16" height="14" fill="none" stroke="#333" stroke-width="1"/>
  <polygon points="72,38 80,32 88,38" fill="none" stroke="#333" stroke-width="1"/>
  <rect x="75" y="42" width="3" height="3" fill="#1e40af"/>
  <rect x="82" y="42" width="3" height="3" fill="#1e40af"/>

  <!-- Battery -->
  <rect x="92" y="30" width="12" height="20" fill="none" stroke="#22C55E" stroke-width="1.5"/>
  <rect x="93" y="26" width="10" height="2" fill="#22C55E"/>
  <rect x="95" y="35" width="6" height="8" fill="#22C55E" opacity="0.7"/>

  <!-- Lightning bolt inside battery -->
  <path d="M101 32 L98 38 L100 38 L97 45" stroke="#FFB800" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Company Name -->
  <text x="110" y="35" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">
    Nova
  </text>
  <text x="130" y="35" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#22C55E">
    Rays
  </text>
  <text x="110" y="46" font-family="Arial, sans-serif" font-size="5" fill="#666">
    Solar Energy
  </text>
</svg>
